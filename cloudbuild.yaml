steps:
  # Step 1: Build Flutter APK
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/cce9b8d9-aa03-4985-a0e/mentrix-apk:latest'
      - '-f'
      - 'Dockerfile'
      - '.'

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/cce9b8d9-aa03-4985-a0e/mentrix-apk:latest'

images:
  - 'gcr.io/cce9b8d9-aa03-4985-a0e/mentrix-apk:latest'

timeout: '3600s'
