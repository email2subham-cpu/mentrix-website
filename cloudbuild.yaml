steps:
  # Build Flutter APK
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Install Flutter
        git clone https://github.com/flutter/flutter.git /workspace/flutter
        export PATH="/workspace/flutter/bin:$PATH"
        
        # Build APK
        cd /workspace/mentrix_student_app
        flutter pub get
        flutter build apk --release
        
        # Copy APK to output
        mkdir -p /workspace/output
        cp build/app/outputs/apk/release/app-release.apk /workspace/output/app-release.apk

timeout: '3600s'

options:
  logging: CLOUD_LOGGING_ONLY
