steps:
  # Build Flutter APK
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'run'
      - '--rm'
      - '-v'
      - '/workspace:/workspace'
      - '-w'
      - '/workspace/mentrix_student_app'
      - 'ubuntu:22.04'
      - 'bash'
      - '-c'
      - |
        apt-get update && apt-get install -y curl git unzip openjdk-11-jdk xz-utils wget
        git config --global --add safe.directory /opt/flutter
        curl https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.19.0-stable.tar.xz -o /tmp/flutter.tar.xz
        tar xf /tmp/flutter.tar.xz -C /opt
        
        mkdir -p /opt/android-sdk
        export ANDROID_HOME=/opt/android-sdk
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/cmdline-tools.zip
        unzip /tmp/cmdline-tools.zip -d /opt/android-sdk
        
        /opt/flutter/bin/flutter config --no-analytics
        /opt/flutter/bin/flutter pub get
        /opt/flutter/bin/flutter build apk --release
        mkdir -p /workspace/output
        cp build/app/outputs/apk/release/app-release.apk /workspace/output/app-release.apk

timeout: '3600s'

options:
  logging: CLOUD_LOGGING_ONLY
