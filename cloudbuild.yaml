steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'run'
      - '--rm'
      - '-v'
      - '/workspace:/workspace'
      - '-w'
      - '/workspace/mentrix_student_app'
      - 'cirrusci/flutter:latest'
      - 'bash'
      - '-c'
      - |
        flutter pub get
        flutter build apk --release
        mkdir -p /workspace/output
        cp build/app/outputs/apk/release/app-release.apk /workspace/output/app-release.apk

timeout: '3600s'

options:
  logging: CLOUD_LOGGING_ONLY
